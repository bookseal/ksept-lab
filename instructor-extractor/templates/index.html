<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>강사 구인 추출기</title>
  <style>
    body { font-family: -apple-system, sans-serif; max-width: 700px; margin: 40px auto; padding: 0 16px; }
    textarea { width: 100%; height: 200px; font-size: 14px; padding: 8px; box-sizing: border-box; }
    button { margin-top: 12px; padding: 8px 20px; font-size: 15px; cursor: pointer; }
    #result { margin-top: 20px; padding: 16px; background: #f5f5f5; border-radius: 6px;
              white-space: pre-wrap; min-height: 40px; }
  </style>
</head>
<body>
  <h1>강사 구인 텍스트 추출기</h1>
  <p>이메일·카톡에서 받은 강사 구인 글을 아래에 붙여넣고 [추출]을 누르세요.</p>

  <textarea id="input" placeholder="여기에 강사 구인 텍스트를 붙여넣으세요..."></textarea>
  <button id="extract-btn">추출</button>

  <div id="result">결과가 여기에 표시됩니다.</div>

  <script>
    const button = document.getElementById("extract-btn");
    const input = document.getElementById("input");
    const result = document.getElementById("result");

    button.addEventListener("click", () => {
      const text = input.value.trim();
      if (text === "") {
        result.textContent = "⚠️ 먼저 텍스트를 입력하세요.";
        return;
      }
      result.textContent = "입력한 내용:\n" + text;
    });
  </script>
</body>
</html>
